name: Bug report
description: Report something broken on the public site.
title: "Bug: "
labels: ["feedback", "bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for public, already-triaged bugs. For private feedback, use https://willitstick.fyi/feedback.
  - type: input
    id: page
    attributes:
      label: Page
      placeholder: https://willitstick.fyi/submit
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Select ...
        3. See ...
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Browser/device
      placeholder: Safari on iPhone, Chrome on macOS, etc.
    validations:
      required: false
